<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Finite Automata</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="grid">
            <h2>Editor</h2>
            <h2>Properties</h2>
            <div>
                <input type="button" id="backend-button" value="Switch Renderer">
                <input type="button" id="clear-button" value="Clear">
                <p id="renderer-text">Canvas Renderer</p>
                <canvas id="canvas" tabindex="1"></canvas>
                <svg id='svg' xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
            <div>
                <div id="node" hidden>
                    Name: <input type="text" id="node-name"><br>
                    Accept: <input type="checkbox" id="node-accept"><br>
                    <input type="button" id="node-start" value="Set as Start">
                </div>
                <div id="link" hidden>
                    Text: <input type="text" id="link-text">
                    <p id="symbols-error" class="error" hidden>Symbol list is invalid! There must be no duplicates and only single characters.</p>
                    Epsilon: <input type="checkbox" id="link-epsilon"><br>
                </div>
            </div>
        </div>
        <input type="button" id="print-button" value="Print Graph">
        <h2>Test</h2>
        <input type="text" id="test-text">
        <input type="button" id="test-dfa" value="As DFA">
        <input type="button" id="test-nfa" value="As NFA">
    </body>
    <script src="script.js" type="module"></script>
</html>
