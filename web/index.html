<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Finite Automata</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="grid">
            <h2>Editor</h2>
            <h2>Properties</h2>
            <div>
                <canvas id="canvas"></canvas>
            </div>
            <div>
                <div id="node" hidden="true">
                    Name: <input type="text" id="node-name"><br>
                    Accept: <input type="checkbox" id="node-accept"><br>
                    <input type="button" id="node-start" value="Set as Start">
                </div>
                <div id="link" hidden="true">
                    Text: <input type="text" id="link-text">
                    Epsilon: <input type="checkbox" id="link-epsilon"><br>
                </div>
            </div>
        </div>
        <input type="button" id="print-button" value="Print Graph">
    </body>
    <script src="script.js" type="module"></script>
</html>
